upstream django {
    server web:8000;
}

# redirect all HTTP to HTTPS
server {
    listen 80;
    server_name managelibrary.app www.managelibrary.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

# main HTTPS server block
server {
    listen 443 ssl;
    server_name managelibrary.app www.managelibrary.app;

    # SSL certificate paths (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/managelibrary.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/managelibrary.app/privkey.pem;

    # modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # proxy headers forwarded to Django so SECURE_PROXY_SSL_HEADER works
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 10M;

    # static files served directly by Nginx (never hits Gunicorn)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # media files
    location /media/ {
        alias /app/mediafiles/;
    }

    # all other requests proxied to Gunicorn via the internal Docker network
    location / {
        proxy_pass         http://django;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
